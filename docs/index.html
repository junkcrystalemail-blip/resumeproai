<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume AI Pro - Documentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .policy-link {
            display: inline-block;
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .policy-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .policy-link.privacy {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .policy-link.data-deletion {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .subtitle {
                font-size: 1em;
            }
            
            .policy-link {
                padding: 15px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Resume AI Pro</h1>
        <p class="subtitle">Legal & Privacy Documentation</p>
        
        <div class="link-grid">
            <a href="privacy-policy.html" class="policy-link privacy">Privacy Policy</a>
            <a href="data-deletion.html" class="policy-link data-deletion">Data Deletion Policy</a>
        </div>
        
        <footer>
            <p>Resume AI Pro © 2026. All rights reserved.</p>
            <p>For more information, visit our <a href="https://github.com/junkcrystalemail-blip/resumeproai" target="_blank" style="color: #667eea;">GitHub repository</a></p>
        </footer>
    </div>
</body>
</html>
